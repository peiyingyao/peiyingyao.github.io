name: Deploy static content to Pages

on:
  push:
    branches: ['main']

  schedule:
    - cron: '30 6 * * *'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 安装 aria2
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      # 创建目录
      - name: Prepare site directory
        run: |
          rm -rf site
          mkdir -p site

      # aria2 并行下载
      - name: Download all categories
        run: |

          for list in urls/*.txt; do

            category=$(basename "$list" .txt)

            mkdir -p "site/$category"

            echo "Processing category: $category"

            aria2c \
              --dir="site/$category" \
              --input-file="$list" \
              --max-concurrent-downloads=5 \
              --split=5 \
              --min-split-size=1M \
              --retry-wait=2 \
              --max-tries=5 \
              --timeout=30 \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --remove-control-file=true

            # 查看文件
            ls -lh "site/$category"
          done

      - name: Generate indexes
        run: |

          UPDATED=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M UTC+8")

          #
          # 生成总站首页
          #

          cat > site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">

          <head>

            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <!-- 禁止搜索引擎索引 -->
            <meta name="robots" content="noindex,nofollow">

            <title>Rule Mirror</title>

            <style>

              :root {
                --bg: #ffffff;
                --text: #111111;
                --border: #e5e5e5;
                --header: #f5f5f5;
                --link: #0366d6;
              }

              @media (prefers-color-scheme: dark) {

                :root {
                  --bg: #0d1117;
                  --text: #e6edf3;
                  --border: #30363d;
                  --header: #161b22;
                  --link: #58a6ff;
                }
              }

              body {
                background: var(--bg);
                color: var(--text);
                font-family: Arial, sans-serif;
                max-width: 1000px;
                margin: 40px auto;
                padding: 20px;
              }

              h1 {
                border-bottom: 1px solid var(--border);
                padding-bottom: 10px;
              }

              ul {
                list-style: none;
                padding: 0;
              }

              li {
                margin: 14px 0;
              }

              a {
                color: var(--link);
                text-decoration: none;
              }

              a:hover {
                text-decoration: underline;
              }

            </style>

          </head>

          <body>

            <h1>Rule Mirror</h1>

            <p>Last Updated: ${UPDATED}</p>

            <ul>
          EOF

          #
          # 遍历所有分类目录
          #

          for dir in site/*/; do

            category=$(basename "$dir")

            echo "
              <li>
                <a href=\"$category/\">
                  $category
                </a>
              </li>
            " >> site/index.html

          done

          cat >> site/index.html <<EOF

            </ul>

          </body>
          </html>
          EOF

          #
          # 为每个分类生成 index.html
          #

          for dir in site/*/; do

            category=$(basename "$dir")

            cat > "$dir/index.html" <<EOF
          <!DOCTYPE html>
          <html lang="en">

          <head>

            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <meta name="robots" content="noindex,nofollow">

            <title>${category}</title>

            <style>

              :root {
                --bg: #ffffff;
                --text: #111111;
                --border: #e5e5e5;
                --header: #f5f5f5;
                --link: #0366d6;
                --button: #0366d6;
                --button-text: #ffffff;
              }

              @media (prefers-color-scheme: dark) {

                :root {
                  --bg: #0d1117;
                  --text: #e6edf3;
                  --border: #30363d;
                  --header: #161b22;
                  --link: #58a6ff;
                  --button: #238636;
                  --button-text: #ffffff;
                }
              }

              body {
                background: var(--bg);
                color: var(--text);
                font-family: Arial, sans-serif;
                max-width: 1000px;
                margin: 40px auto;
                padding: 20px;
                line-height: 1.6;
              }

              h1 {
                border-bottom: 1px solid var(--border);
                padding-bottom: 10px;
              }

              .updated {
                margin-bottom: 20px;
                opacity: 0.7;
              }

              table {
                width: 100%;
                border-collapse: collapse;
              }

              th, td {
                padding: 14px;
                border-bottom: 1px solid var(--border);
                text-align: left;
              }

              th {
                background: var(--header);
              }

              tr:hover {
                background: rgba(127,127,127,0.08);
              }

              a {
                color: var(--link);
                text-decoration: none;
              }

              a:hover {
                text-decoration: underline;
              }

              .download-btn {

                display: inline-block;
                padding: 6px 12px;
                border-radius: 8px;

                background: var(--button);
                color: var(--button-text);

                font-size: 14px;
                text-decoration: none;
              }

              .download-btn:hover {
                opacity: 0.9;
                text-decoration: none;
              }

            </style>

          </head>

          <body>

            <h1>${category}</h1>

            <p>
              <a href="../">← Back</a>
            </p>

            <p>Last Updated: ${UPDATED}</p>

            <table>

              <tr>
                <th>File</th>
                <th>Size</th>
                <th>Modified</th>
                <th>Download</th>
              </tr>
          EOF

            #
            # 文件排序
            #

            for file in $(find "$dir" -maxdepth 1 -type f ! -name "index.html" | sort); do

              filename=$(basename "$file")

              filesize=$(du -h "$file" | cut -f1)

              modified=$(date -u -r "$file" +"%Y-%m-%d %H:%M UTC")

              echo "
                <tr>

                  <td>
                    <a href=\"$filename\">
                      $filename
                    </a>
                  </td>

                  <td>$filesize</td>

                  <td>$modified</td>

                  <td>
                    <a
                      class=\"btn\"
                      href=\"$filename\"
                      download
                    >
                      Download
                    </a>
                  </td>

                </tr>
              " >> "$dir/index.html"

            done

            cat >> "$dir/index.html" <<EOF

            </table>

          </body>
          </html>
          EOF

          done
      # 上传 Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      # 部署
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
